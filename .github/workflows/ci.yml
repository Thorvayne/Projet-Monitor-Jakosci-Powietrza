name: CI/CD Pipeline - Monitor Jakości Powietrza

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja lintera
        run: pip install flake8

      - name: Linting
        run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Uwierzytelnianie w Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/704282853205/locations/global/workloadIdentityPools/github-pool/providers/github-project'
          service_account: 'monitor-jp@monitor-jakosci-powietrza.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Logowanie do Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-central2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Budowanie i wypychanie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: europe-central2-docker.pkg.dev/monitor-jakosci-powietrza/monitor-repo/monitor-app:latest

      - name: Deploy na Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'monitor-jakosci-powietrza'
          image: 'europe-central2-docker.pkg.dev/monitor-jakosci-powietrza/monitor-repo/monitor-app:latest'
          region: 'europe-central2'
          flags: '--allow-unauthenticated --service-account=monitor-jp@monitor-jakosci-powietrza.iam.gserviceaccount.com'
